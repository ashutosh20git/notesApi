
services:
  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=notesdb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=notesdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - notes_db:/var/lib/postgresql/data
      - .src/models/init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
 notes_db: